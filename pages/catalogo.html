<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Cine Brasilis</title>
    <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
    <link rel = "stylesheet" href = "../style/global.css">
    <link rel = "stylesheet" href = "../style/catalogo.css">
</head>
<body>
    <header>
        <div class="header-topo">
            <div class="logo">
                <img src="../img/logo.svg" alt="Cine Brasilis" style="height:60px;">
                <h1>Cine Brasilis</h1>
            </div>
            <div id="idioma-switch" class="idioma-switch" role="group" aria-label="Language / Idioma">
                <button class="idioma-opcao" data-idioma="pt" aria-label="Português"><svg class="bandeira" viewBox="0 0 28 20" aria-hidden="true"><rect width="28" height="20" rx="2" fill="#009C3B"/><path d="M14 3 25 10 14 17 3 10Z" fill="#FFDF00"/><circle cx="14" cy="10" r="4" fill="#002776"/></svg></button>
                <button class="idioma-opcao" data-idioma="en" aria-label="English"><svg class="bandeira" viewBox="0 0 60 30" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0 0 60 30M60 0 0 30" stroke="#fff" stroke-width="6"/><path d="M0 0 60 30M60 0 0 30" stroke="#C8102E" stroke-width="4"/><path d="M30 0V30M0 15H60" stroke="#fff" stroke-width="10"/><path d="M30 0V30M0 15H60" stroke="#C8102E" stroke-width="6"/></svg></button>
            </div>
            <div id="tema-switch" class="tema-switch" role="group" aria-label="Selecionar tema">
                <button class="tema-opcao" data-tema="light" aria-label="Modo claro"><svg class="tema-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg><span data-i18n="tema.claro">Claro</span></button>
                <button class="tema-opcao" data-tema="dark" aria-label="Modo escuro"><svg class="tema-icone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span data-i18n="tema.escuro">Escuro</span></button>
            </div>
        </div>
        
        <nav>
            <ul>
                <li><a href="home.html" data-i18n="nav.inicio">Início</a></li>
                <li><a href="destaques.html" data-i18n="nav.destaques">Destaques</a></li>
                <li><a href="indicacoes.html" data-i18n="nav.indicacoes">Indicações</a></li>
                <li><a href="mapa.html" data-i18n="nav.mapa">Mapa</a></li>
                <li><a href="catalogo.html" class = "ativo" data-i18n="nav.catalogo">Catálogo</a></li>
                <li><a href="sobre.html" data-i18n="nav.sobre">Sobre</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <section class="catalogo-header">
            <h2>Catálogo</h2>
            <p class="catalogo-subtitulo">Explore mais de 25 mil produções brasileiras</p>
        </section>

        <section class="filtros-container">
            <input
                type="text"
                id="filtro-busca"
                class="filtro-input"
                placeholder="Buscar por título..."
                autocomplete="off"
            >
            <button id="btn-filtros" class="btn-filtros" type="button" aria-expanded="false" aria-controls="filtros-painel">
                <svg class="icone-funil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                </svg>
                <span>Filtros</span>
            </button>
            <button id="filtro-limpar" class="filtro-btn-limpar">Limpar filtros</button>
        </section>

        <div id="filtros-painel" class="filtros-painel" hidden>
            <select id="filtro-genero" class="filtro-select">
                <option value="">Todos os gêneros</option>
            </select>
            <select id="filtro-decada" class="filtro-select">
                <option value="">Todas as décadas</option>
                <option value="1940">1940s</option>
                <option value="1950">1950s</option>
                <option value="1960">1960s</option>
                <option value="1970">1970s</option>
                <option value="1980">1980s</option>
                <option value="1990">1990s</option>
                <option value="2000">2000s</option>
                <option value="2010">2010s</option>
                <option value="2020">2020s</option>
            </select>
            <select id="filtro-metragem" class="filtro-select">
                <option value="">Todas as metragens</option>
                <option value="Curta">Curta (até 15 min)</option>
                <option value="Média">Média (15 a 70 min)</option>
                <option value="Longa">Longa (acima de 70 min)</option>
            </select>
            <select id="filtro-estado" class="filtro-select">
                <option value="">Todos os estados</option>
            </select>
            <input
                type="text"
                id="filtro-diretor"
                class="filtro-input"
                placeholder="Buscar por diretor..."
                autocomplete="off"
            >
            <div class="filtro-ator-wrapper">
                <input
                    type="text"
                    id="filtro-ator"
                    class="filtro-input"
                    placeholder="Buscar por ator (separe por vírgula)..."
                    autocomplete="off"
                >
                <ul id="ator-sugestoes" class="ator-sugestoes"></ul>
            </div>
        </div>

        <p id="catalogo-contagem" class="catalogo-contagem"></p>
        <div id="catalogo-grid" class="catalogo-grid"></div>
        <div id="paginacao-container" class="paginacao-container"></div>
    </main>

    <footer>
        <nav class="footer-nav" aria-label="Navegação do rodapé">
            <a href="home.html" data-i18n="nav.inicio">Início</a>
            <a href="destaques.html" data-i18n="nav.destaques">Destaques</a>
            <a href="indicacoes.html" data-i18n="nav.indicacoes">Indicações</a>
            <a href="mapa.html" data-i18n="nav.mapa">Mapa</a>
            <a href="catalogo.html" data-i18n="nav.catalogo">Catálogo</a>
            <a href="sobre.html" data-i18n="nav.sobre">Sobre</a>
        </nav>
        <p><strong>Cine Brasilis</strong> — <span data-i18n="footer.tagline">Valorizando o cinema brasileiro</span></p>
        <p class="footer-direitos" data-i18n="footer.direitos">Todos os direitos reservados.</p>
    </footer>
    <!-- Script com funções globais primeiro -->
    <script src="../js/i18n.js"></script>
    <script src="../js/global.js"></script>
    <!-- Script desta página depois -->
    <script src="../js/catalogo.js"></script>
    <!-- GoatCounter (analytics de acessos, sem cookies) -->
    <script data-goatcounter="https://cinebrasilis.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
